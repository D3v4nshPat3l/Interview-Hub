<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="Road to cyber dominance roadmap">

  <defs>
    <linearGradient id="redGlow" x1="0" x2="1">
      <stop offset="0%" stop-color="#ff1a1a"/>
      <stop offset="50%" stop-color="#b30000"/>
      <stop offset="100%" stop-color="#ff3333"/>
    </linearGradient>
    <linearGradient id="darkPanel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0d10"/>
      <stop offset="100%" stop-color="#050505"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#191d22" stroke-width="1"/>
    </pattern>
    <pattern id="microGrid" width="10" height="10" patternUnits="userSpaceOnUse">
      <path d="M10 0H0V10" fill="none" stroke="#111418" stroke-width="0.7"/>
    </pattern>
    <style>
      .bg { fill:#050505; }
      .grid { fill:url(#grid); opacity:.65; }
      .micro { fill:url(#microGrid); opacity:.5; }
      .red { fill:#e50914; }
      .redStroke { stroke:#e50914; }
      .white { fill:#f2f2f2; }
      .muted { fill:#a7adb5; }
      .dim { fill:#575e66; }
      .panel { fill:url(#darkPanel); stroke:#3a3f46; stroke-width:2; }
      .panelRed { fill:#070707; stroke:#e50914; stroke-width:2; }
      .thin { stroke-width:1; }
      .mid { stroke-width:2; }
      .thick { stroke-width:4; }
      .mono { font-family:'Courier New', monospace; }
      .sans { font-family:Arial, Helvetica, sans-serif; }
      .title { font-family:Arial Black, Impact, sans-serif; font-weight:900; letter-spacing:2px; }
      .subtitle { font-family:'Courier New', monospace; letter-spacing:5px; }
      .small { font-size:18px; }
      .tiny { font-size:13px; }
      .label { font-size:22px; letter-spacing:2px; }
      .noFill { fill:none; }
    </style>
  </defs>

  <rect class="bg" width="1600" height="900"/>
  <rect class="grid" width="1600" height="900"/>
  <path d="M30 30H1570L1585 45V855L1570 870H30L15 855V45Z" fill="none" stroke="#e50914" stroke-width="2"/>
  <path d="M130 210 C390 100,620 170,800 130 C1020 80,1210 175,1465 120" fill="none" stroke="#3a0a0a" stroke-width="2"/>
  <text x="800" y="112" text-anchor="middle" class="title white" font-size="52">ROAD TO</text>
  <text x="800" y="200" text-anchor="middle" class="title white" font-size="88">CYBER <tspan fill="#e50914">DOMINANCE</tspan></text>
  <text x="800" y="255" text-anchor="middle" class="subtitle white" font-size="24">LEARN DEEPLY. EXPLAIN CLEARLY. PRACTICE <tspan fill="#e50914">BRUTALLY.</tspan></text>

